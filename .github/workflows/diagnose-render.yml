name: Diagnose Render Build

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Render service + last deploy logs
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_NAME: whatsapp-ai-backend
        run: |
          set -e
          # Find service id by name
          SVC=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=$SERVICE_NAME&limit=20")
          echo "$SVC" | jq '[.[].service | {id,name,serviceDetails}] | .[0]'
          SID=$(echo "$SVC" | jq -r --arg n "$SERVICE_NAME" '[.[] | select(.service.name==$n)][0].service.id')
          echo "Service ID: $SID"
          mkdir -p out
          # Save service details
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SID" > out/service.json
          jq '.' out/service.json | head -200

          # List deploys
          DEPLOYS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SID/deploys?limit=5")
          echo "$DEPLOYS" > out/deploys.json
          jq '[.[].deploy | {id,status,commit:.commit.message,startedAt,finishedAt}]' out/deploys.json

          DID=$(echo "$DEPLOYS" | jq -r '.[0].deploy.id')
          echo "Latest Deploy ID: $DID"
          curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SID/deploys/$DID" > out/deploy.json
          jq '.' out/deploy.json

          # Try to fetch logs (Render API v1 logs endpoint)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          AGO=$(date -u -d '4 hours ago' +%Y-%m-%dT%H:%M:%S.000Z)
          curl -s -G -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/logs" \
            --data-urlencode "ownerId=$(jq -r '.ownerId' out/service.json)" \
            --data-urlencode "resource=$SID" \
            --data-urlencode "startTime=$AGO" \
            --data-urlencode "endTime=$NOW" \
            --data-urlencode "limit=500" > out/logs.json
          jq '.logs[]? | {timestamp,message:.message[0:300]}' out/logs.json | head -200

      - uses: actions/upload-artifact@v4
        with:
          name: render-diagnose
          path: out/

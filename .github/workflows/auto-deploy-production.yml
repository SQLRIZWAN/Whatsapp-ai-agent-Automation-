name: Deploy to Render and Vercel

on:
  push:
    branches:
      - claude/production-deployment-setup-pnyZn
      - main
  workflow_dispatch:

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.resolve.outputs.service_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve or create Render service
        id: resolve
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_NAME: whatsapp-ai-backend
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          FRONTEND_URL: https://whatsapp-ai-automation.vercel.app
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          echo "Looking for existing Render service named $SERVICE_NAME..."

          # Fetch owner id
          OWNER_ID=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners?limit=1" | jq -r '.[0].owner.id')
          echo "Owner: $OWNER_ID"

          # Search for existing service
          EXISTING=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=$SERVICE_NAME&limit=20" \
            | jq -r --arg n "$SERVICE_NAME" '[.[] | select(.service.name==$n)] | .[0].service.id // empty')

          if [ -z "$EXISTING" ]; then
            echo "Creating new Render service..."
            CREATE_PAYLOAD=$(jq -n \
              --arg owner "$OWNER_ID" \
              --arg name "$SERVICE_NAME" \
              --arg repo "$GITHUB_REPO_URL" \
              --arg branch "$BRANCH_NAME" \
              --arg jwt "$JWT_SECRET" \
              --arg frontend "$FRONTEND_URL" \
              --arg fpid "$FIREBASE_PROJECT_ID" \
              --arg fem "$FIREBASE_CLIENT_EMAIL" \
              --arg fpk "$FIREBASE_PRIVATE_KEY" \
              --arg gem "$GEMINI_API_KEY" \
              '{
                type: "web_service",
                name: $name,
                ownerId: $owner,
                repo: $repo,
                branch: $branch,
                autoDeploy: "yes",
                serviceDetails: {
                  env: "node",
                  region: "oregon",
                  plan: "free",
                  runtime: "node",
                  healthCheckPath: "/health",
                  envSpecificDetails: {
                    buildCommand: "cd backend && npm install && npm run build",
                    startCommand: "cd backend && npm start"
                  },
                  numInstances: 1
                },
                envVars: [
                  {key: "NODE_ENV", value: "production"},
                  {key: "PORT", value: "10000"},
                  {key: "JWT_SECRET", value: $jwt},
                  {key: "FRONTEND_URL", value: $frontend},
                  {key: "FIREBASE_PROJECT_ID", value: $fpid},
                  {key: "FIREBASE_CLIENT_EMAIL", value: $fem},
                  {key: "FIREBASE_PRIVATE_KEY", value: $fpk},
                  {key: "GEMINI_API_KEY", value: $gem},
                  {key: "LOG_LEVEL", value: "info"}
                ]
              }')

            RESP=$(curl -s -X POST https://api.render.com/v1/services \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$CREATE_PAYLOAD")
            echo "Create response:"
            echo "$RESP" | jq '.'
            SERVICE_ID=$(echo "$RESP" | jq -r '.service.id // .id // empty')
            SERVICE_URL=$(echo "$RESP" | jq -r '.service.serviceDetails.url // .serviceDetails.url // empty')
          else
            SERVICE_ID="$EXISTING"
            echo "Found existing service: $SERVICE_ID"
            # Trigger a deploy
            curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"clearCache":"do_not_clear"}' | jq '.'
            DETAILS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID")
            SERVICE_URL=$(echo "$DETAILS" | jq -r '.serviceDetails.url // empty')
          fi

          if [ -z "$SERVICE_URL" ] || [ "$SERVICE_URL" = "null" ]; then
            SERVICE_URL="https://${SERVICE_NAME}.onrender.com"
          fi
          echo "Service URL: $SERVICE_URL"
          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    outputs:
      url: ${{ steps.vercel.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve Vercel scope (user/team id)
        id: scope
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -e
          U=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" https://api.vercel.com/v2/user)
          echo "$U" | jq '{user:.user.username,email:.user.email,id:.user.id}'
          USER_ID=$(echo "$U" | jq -r '.user.id')
          echo "user_id=$USER_ID" >> "$GITHUB_OUTPUT"

      - name: Ensure Vercel project exists
        id: project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_NAME: whatsapp-ai-automation
          BACKEND_URL: ${{ needs.deploy-backend.outputs.service_url }}
        run: |
          set -e
          PN="$PROJECT_NAME"
          # Check if project exists
          CHECK=$(curl -s -o /tmp/proj.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$PN")
          if [ "$CHECK" != "200" ]; then
            echo "Creating Vercel project $PN..."
            curl -s -X POST "https://api.vercel.com/v10/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg name "$PN" --arg api "$BACKEND_URL" '{
                name: $name,
                framework: "vite",
                rootDirectory: "frontend",
                buildCommand: "npm run build",
                outputDirectory: "dist",
                environmentVariables: [
                  {key:"VITE_API_URL", value:$api, type:"plain", target:["production","preview","development"]}
                ]
              }')" | jq '{id,name,framework}'
          else
            echo "Project $PN already exists."
            # Upsert VITE_API_URL env
            curl -s -X POST "https://api.vercel.com/v10/projects/$PN/env?upsert=true" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg api "$BACKEND_URL" '{key:"VITE_API_URL", value:$api, type:"plain", target:["production","preview","development"]}')" | jq '.key // .error'
          fi

      - name: Deploy to Vercel (production)
        id: vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BACKEND_URL: ${{ needs.deploy-backend.outputs.service_url }}
          PROJECT_NAME: whatsapp-ai-automation
        run: |
          set -e
          echo "VITE_API_URL=$BACKEND_URL" > .env.production
          DEPLOY_URL=$(vercel deploy \
            --prod \
            --yes \
            --token "$VERCEL_TOKEN" \
            --name "$PROJECT_NAME" \
            --cwd "$PWD" 2>&1 | tee /tmp/vercel.log | tail -n1)
          echo "Raw deploy URL: $DEPLOY_URL"
          if [[ "$DEPLOY_URL" != https://* ]]; then
            echo "Deploy failed. Log tail:"
            tail -n 100 /tmp/vercel.log
            exit 1
          fi
          # Alias to the canonical project domain
          ALIAS="${PROJECT_NAME}.vercel.app"
          vercel alias set "$DEPLOY_URL" "$ALIAS" --token "$VERCEL_TOKEN" || true
          FINAL_URL="https://$ALIAS"
          echo "FINAL URL: $FINAL_URL"
          echo "url=$FINAL_URL" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Live Services
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    steps:
      - name: Write URLs file for artifact
        run: |
          mkdir -p out
          cat > out/urls.json <<EOF
          {
            "backend": "${{ needs.deploy-backend.outputs.service_url }}",
            "frontend": "${{ needs.deploy-frontend.outputs.url }}"
          }
          EOF
          cat out/urls.json

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-urls
          path: out/urls.json

      - name: Print URLs
        run: |
          echo "=================================="
          echo "Backend:  ${{ needs.deploy-backend.outputs.service_url }}"
          echo "Frontend: ${{ needs.deploy-frontend.outputs.url }}"
          echo "=================================="

      - name: Wait for backend build (up to 10 min)
        run: |
          URL="${{ needs.deploy-backend.outputs.service_url }}/health"
          for i in $(seq 1 60); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo 000)
            echo "attempt $i: $CODE $URL"
            if [ "$CODE" = "200" ]; then
              echo "Backend is live."
              break
            fi
            sleep 10
          done
          curl -sS "$URL" || true

      - name: Check frontend
        run: |
          URL="${{ needs.deploy-frontend.outputs.url }}"
          curl -s -o /dev/null -w "Frontend HTTP: %{http_code}\n" "$URL" || true

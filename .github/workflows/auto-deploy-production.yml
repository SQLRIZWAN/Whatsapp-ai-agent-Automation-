name: Deploy to Render and Vercel

on:
  push:
    branches:
      - claude/production-deployment-setup-pnyZn
      - main
    paths-ignore:
      - 'diagnostics/**'
      - 'URLS.md'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    outputs:
      service_url: ${{ steps.resolve.outputs.service_url }}
      service_id: ${{ steps.resolve.outputs.service_id }}
      deploy_id: ${{ steps.resolve.outputs.deploy_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve or create Render service and trigger deploy
        id: resolve
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_NAME: whatsapp-ai-backend
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}
          BRANCH_NAME: ${{ github.ref_name }}
          FRONTEND_URL: https://whatsapp-ai-automation.vercel.app
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          OWNER_ID=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/owners?limit=1" | jq -r '.[0].owner.id')
          echo "Owner: $OWNER_ID"

          EXISTING=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=$SERVICE_NAME&limit=20")
          SERVICE_ID=$(echo "$EXISTING" | jq -r --arg n "$SERVICE_NAME" '[.[] | select(.service.name==$n)] | .[0].service.id // empty')

          if [ -z "$SERVICE_ID" ]; then
            echo "Creating new service..."
            CREATE_PAYLOAD=$(jq -n \
              --arg owner "$OWNER_ID" \
              --arg name "$SERVICE_NAME" \
              --arg repo "$GITHUB_REPO_URL" \
              --arg branch "$BRANCH_NAME" \
              --arg jwt "$JWT_SECRET" \
              --arg frontend "$FRONTEND_URL" \
              --arg fpid "$FIREBASE_PROJECT_ID" \
              --arg fem "$FIREBASE_CLIENT_EMAIL" \
              --arg fpk "$FIREBASE_PRIVATE_KEY" \
              --arg gem "$GEMINI_API_KEY" \
              '{
                type: "web_service",
                name: $name,
                ownerId: $owner,
                repo: $repo,
                branch: $branch,
                rootDir: "backend",
                autoDeploy: "no",
                serviceDetails: {
                  env: "node",
                  region: "oregon",
                  plan: "free",
                  runtime: "node",
                  healthCheckPath: "/health",
                  envSpecificDetails: {
                    buildCommand: "npm install && npm run build",
                    startCommand: "npm start"
                  },
                  numInstances: 1
                },
                envVars: [
                  {key: "NODE_ENV", value: "production"},
                  {key: "JWT_SECRET", value: $jwt},
                  {key: "FRONTEND_URL", value: $frontend},
                  {key: "FIREBASE_PROJECT_ID", value: $fpid},
                  {key: "FIREBASE_CLIENT_EMAIL", value: $fem},
                  {key: "FIREBASE_PRIVATE_KEY", value: $fpk},
                  {key: "GEMINI_API_KEY", value: $gem},
                  {key: "LOG_LEVEL", value: "info"}
                ]
              }')

            RESP=$(curl -s -X POST https://api.render.com/v1/services \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$CREATE_PAYLOAD")
            echo "$RESP" | jq '.'
            SERVICE_ID=$(echo "$RESP" | jq -r '.service.id // empty')
          fi

          echo "Service ID: $SERVICE_ID"

          # PATCH existing service to ensure correct branch + rootDir + commands + autoDeploy off
          PATCH_PAYLOAD=$(jq -n --arg branch "$BRANCH_NAME" '{
            branch: $branch,
            rootDir: "backend",
            autoDeploy: "no",
            serviceDetails: {
              envSpecificDetails: {
                buildCommand: "npm install && npm run build",
                startCommand: "npm start"
              }
            }
          }')
          curl -s -X PATCH "https://api.render.com/v1/services/$SERVICE_ID" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PATCH_PAYLOAD" | jq '{id:.id,branch:.branch,autoDeploy:.autoDeploy,rootDir:.rootDir,build:.serviceDetails.envSpecificDetails.buildCommand,start:.serviceDetails.envSpecificDetails.startCommand}'

          # Cancel any in-flight deploys so our API-triggered one is authoritative
          for D in $(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID/deploys?limit=5" \
            | jq -r '.[].deploy | select(.status=="created" or .status=="queued" or .status=="build_in_progress" or .status=="update_in_progress") | .id'); do
            echo "Canceling in-flight deploy $D"
            curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys/$D/cancel" \
              -H "Authorization: Bearer $RENDER_API_KEY" | jq '.status // .message' || true
          done

          # Upsert env vars
          ENV_PAYLOAD=$(jq -n \
            --arg jwt "$JWT_SECRET" \
            --arg frontend "$FRONTEND_URL" \
            --arg fpid "$FIREBASE_PROJECT_ID" \
            --arg fem "$FIREBASE_CLIENT_EMAIL" \
            --arg fpk "$FIREBASE_PRIVATE_KEY" \
            --arg gem "$GEMINI_API_KEY" \
            '[
              {key:"NODE_ENV", value:"production"},
              {key:"JWT_SECRET", value:$jwt},
              {key:"FRONTEND_URL", value:$frontend},
              {key:"FIREBASE_PROJECT_ID", value:$fpid},
              {key:"FIREBASE_CLIENT_EMAIL", value:$fem},
              {key:"FIREBASE_PRIVATE_KEY", value:$fpk},
              {key:"GEMINI_API_KEY", value:$gem},
              {key:"LOG_LEVEL", value:"info"}
            ]')
          curl -s -X PUT "https://api.render.com/v1/services/$SERVICE_ID/env-vars" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$ENV_PAYLOAD" | jq 'length'

          # Trigger a new deploy with cache clear on the current commit
          DEPLOY=$(curl -s -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg sha '${{ github.sha }}' '{clearCache:"clear", commitId:$sha}')")
          echo "$DEPLOY" | jq '.'
          DEPLOY_ID=$(echo "$DEPLOY" | jq -r '.id // empty')

          DETAILS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID")
          SERVICE_URL=$(echo "$DETAILS" | jq -r '.serviceDetails.url // empty')
          [ -z "$SERVICE_URL" ] && SERVICE_URL="https://${SERVICE_NAME}.onrender.com"

          echo "service_url=$SERVICE_URL" >> "$GITHUB_OUTPUT"
          echo "service_id=$SERVICE_ID" >> "$GITHUB_OUTPUT"
          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for Render deploy to finish
        id: wait
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ steps.resolve.outputs.service_id }}
          DEPLOY_ID: ${{ steps.resolve.outputs.deploy_id }}
        run: |
          set -e
          for i in $(seq 1 90); do
            STATUS=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID" \
              | jq -r '.status // "unknown"')
            echo "attempt $i: deploy status = $STATUS"
            case "$STATUS" in
              live) echo "conclusion=live" >> "$GITHUB_OUTPUT"; exit 0 ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated) echo "conclusion=$STATUS" >> "$GITHUB_OUTPUT"; exit 1 ;;
            esac
            sleep 20
          done
          echo "conclusion=timeout" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Capture Render deploy logs to repo (always)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ steps.resolve.outputs.service_id }}
          DEPLOY_ID: ${{ steps.resolve.outputs.deploy_id }}
        run: |
          set +e
          OWNER_ID=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SERVICE_ID" | jq -r '.ownerId')

          mkdir -p diagnostics
          {
            echo "# Render Deploy Diagnostics"
            echo ""
            echo "Run: ${{ github.run_id }}"
            echo "Commit: ${{ github.sha }}"
            echo "Service ID: $SERVICE_ID"
            echo "Deploy ID: $DEPLOY_ID"
            echo ""
            echo "## Service details"
            echo '```json'
            curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID" | jq '.' || true
            echo '```'
            echo ""
            echo "## Latest deploy"
            echo '```json'
            curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/services/$SERVICE_ID/deploys/$DEPLOY_ID" | jq '.' || true
            echo '```'
            echo ""
            echo "## Build logs (last 4h)"
            NOW=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
            AGO=$(date -u -d '4 hours ago' +%Y-%m-%dT%H:%M:%S.000Z)
            echo '```'
            curl -s -G -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/logs" \
              --data-urlencode "ownerId=$OWNER_ID" \
              --data-urlencode "resource=$SERVICE_ID" \
              --data-urlencode "type=build" \
              --data-urlencode "startTime=$AGO" \
              --data-urlencode "endTime=$NOW" \
              --data-urlencode "limit=1000" \
              | jq -r '.logs[]? | "\(.timestamp) \(.message)"' || true
            echo '```'
            echo ""
            echo "## App logs (last 4h)"
            echo '```'
            curl -s -G -H "Authorization: Bearer $RENDER_API_KEY" \
              "https://api.render.com/v1/logs" \
              --data-urlencode "ownerId=$OWNER_ID" \
              --data-urlencode "resource=$SERVICE_ID" \
              --data-urlencode "type=app" \
              --data-urlencode "startTime=$AGO" \
              --data-urlencode "endTime=$NOW" \
              --data-urlencode "limit=500" \
              | jq -r '.logs[]? | "\(.timestamp) \(.message)"' || true
            echo '```'
          } > diagnostics/render.md 2>&1

          # Commit via contents API
          B64=$(base64 -w0 diagnostics/render.md)
          CUR=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/diagnostics/render.md?ref=${{ github.ref_name }}")
          SHA=$(echo "$CUR" | jq -r '.sha // empty')
          PAYLOAD=$(jq -n --arg msg "diagnostics: render run ${{ github.run_id }}" \
                         --arg content "$B64" \
                         --arg branch "${{ github.ref_name }}" \
                         --arg sha "$SHA" \
                         'if $sha == "" then
                            {message:$msg, content:$content, branch:$branch}
                          else
                            {message:$msg, content:$content, branch:$branch, sha:$sha}
                          end')
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/diagnostics/render.md" \
            -d "$PAYLOAD" | jq '.commit.sha // .message'

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    outputs:
      url: ${{ steps.vercel.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve Vercel scope
        id: scope
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -e
          U=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" https://api.vercel.com/v2/user)
          USER_ID=$(echo "$U" | jq -r '.user.id')
          echo "user_id=$USER_ID" >> "$GITHUB_OUTPUT"

      - name: Ensure Vercel project exists
        id: project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_NAME: whatsapp-ai-automation
          BACKEND_URL: ${{ needs.deploy-backend.outputs.service_url }}
        run: |
          set -e
          PN="$PROJECT_NAME"
          CHECK=$(curl -s -o /tmp/proj.json -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$PN")
          if [ "$CHECK" != "200" ]; then
            echo "Creating Vercel project $PN..."
            curl -s -o /tmp/proj.json -w "create http: %{http_code}\n" \
              -X POST "https://api.vercel.com/v10/projects" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg name "$PN" --arg api "$BACKEND_URL" '{
                name: $name,
                framework: "vite",
                rootDirectory: "frontend",
                buildCommand: "npm run build",
                outputDirectory: "dist",
                environmentVariables: [
                  {key:"VITE_API_URL", value:$api, type:"plain", target:["production","preview","development"]}
                ]
              }')"
          else
            curl -s -X POST "https://api.vercel.com/v10/projects/$PN/env?upsert=true" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg api "$BACKEND_URL" '{key:"VITE_API_URL", value:$api, type:"plain", target:["production","preview","development"]}')" >/dev/null
          fi
          jq '{id,name,framework,rootDirectory}' /tmp/proj.json || cat /tmp/proj.json
          PROJECT_ID=$(jq -r '.id' /tmp/proj.json)
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel (production)
        id: vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BACKEND_URL: ${{ needs.deploy-backend.outputs.service_url }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.project_id }}
          VERCEL_ORG_ID: ${{ steps.scope.outputs.user_id }}
          PROJECT_NAME: whatsapp-ai-automation
        run: |
          set +e
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"projectId":"$VERCEL_PROJECT_ID","orgId":"$VERCEL_ORG_ID"}
          EOF
          echo "VITE_API_URL=$BACKEND_URL" > .env.production

          mkdir -p ../diagnostics/vercel
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN" > ../diagnostics/vercel/pull.log 2>&1
          PULL_EC=$?
          echo "pull exit: $PULL_EC"

          vercel build --prod --token "$VERCEL_TOKEN" > ../diagnostics/vercel/build.log 2>&1
          BUILD_EC=$?
          echo "build exit: $BUILD_EC"
          tail -n 40 ../diagnostics/vercel/build.log

          if [ "$BUILD_EC" != "0" ]; then
            echo "::error::vercel build failed"
            set -e
            exit 1
          fi

          vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" > ../diagnostics/vercel/deploy.log 2>&1
          DEPLOY_EC=$?
          echo "deploy exit: $DEPLOY_EC"
          cat ../diagnostics/vercel/deploy.log
          DEPLOY_URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.vercel\.app' ../diagnostics/vercel/deploy.log | tail -n1)

          if [ "$DEPLOY_EC" != "0" ] || [ -z "$DEPLOY_URL" ]; then
            echo "::error::vercel deploy failed"
            exit 1
          fi

          ALIAS="${PROJECT_NAME}.vercel.app"
          vercel alias set "$DEPLOY_URL" "$ALIAS" --token "$VERCEL_TOKEN" >> ../diagnostics/vercel/deploy.log 2>&1 || true
          FINAL_URL="https://$ALIAS"
          echo "FINAL URL: $FINAL_URL"
          echo "url=$FINAL_URL" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Commit Vercel diagnostics to repo
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          [ -d diagnostics/vercel ] || exit 0
          for f in diagnostics/vercel/*.log; do
            [ -f "$f" ] || continue
            B64=$(base64 -w0 "$f")
            PATH_IN_REPO="diagnostics/vercel/$(basename "$f").md"
            CUR=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/contents/$PATH_IN_REPO?ref=${{ github.ref_name }}")
            SHA=$(echo "$CUR" | jq -r '.sha // empty')
            PAYLOAD=$(jq -n --arg msg "diagnostics: vercel $(basename $f) run ${{ github.run_id }}" \
                           --arg content "$B64" \
                           --arg branch "${{ github.ref_name }}" \
                           --arg sha "$SHA" \
                           'if $sha == "" then
                              {message:$msg, content:$content, branch:$branch}
                            else
                              {message:$msg, content:$content, branch:$branch, sha:$sha}
                            end')
            curl -s -X PUT \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.github.com/repos/${{ github.repository }}/contents/$PATH_IN_REPO" \
              -d "$PAYLOAD" | jq '.commit.sha // .message'
          done

  verify:
    name: Verify and publish URLs
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Write URLs.md to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BACKEND_URL: ${{ needs.deploy-backend.outputs.service_url }}
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.url }}
          BACKEND_CONCLUSION: ${{ needs.deploy-backend.result }}
          FRONTEND_CONCLUSION: ${{ needs.deploy-frontend.result }}
        run: |
          cat > URLS.md <<EOF
          # Live URLs (run ${{ github.run_id }})

          Backend:  $BACKEND_URL  ($BACKEND_CONCLUSION)
          Frontend: $FRONTEND_URL  ($FRONTEND_CONCLUSION)
          EOF
          cat URLS.md
          B64=$(base64 -w0 URLS.md)
          CUR=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/URLS.md?ref=${{ github.ref_name }}")
          SHA=$(echo "$CUR" | jq -r '.sha // empty')
          PAYLOAD=$(jq -n --arg msg "urls: run ${{ github.run_id }}" \
                         --arg content "$B64" \
                         --arg branch "${{ github.ref_name }}" \
                         --arg sha "$SHA" \
                         'if $sha == "" then
                            {message:$msg, content:$content, branch:$branch}
                          else
                            {message:$msg, content:$content, branch:$branch, sha:$sha}
                          end')
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/URLS.md" \
            -d "$PAYLOAD" | jq '.commit.sha // .message'

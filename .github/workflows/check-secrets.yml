name: Check secrets and Render env

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Report presence (lengths) of GitHub secrets
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          mkdir -p diagnostics
          {
            echo "# Secret presence report (run ${{ github.run_id }})"
            echo ""
            echo "Lengths only; values are never logged."
            echo ""
            for k in FIREBASE_PROJECT_ID FIREBASE_CLIENT_EMAIL FIREBASE_PRIVATE_KEY FIREBASE_DATABASE_URL GEMINI_API_KEY JWT_SECRET; do
              v="${!k}"
              echo "- $k: len=${#v}"
            done
          } > diagnostics/secrets-report.md
          cat diagnostics/secrets-report.md

      - name: Dump Render service env var keys (no values)
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          SVC=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services?name=whatsapp-ai-backend&limit=5")
          SID=$(echo "$SVC" | jq -r '.[0].service.id')
          echo "Service ID: $SID"
          ENV=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" "https://api.render.com/v1/services/$SID/env-vars?limit=50")
          {
            echo ""
            echo "## Render service env vars (keys + lengths only)"
            echo "Service: $SID"
            echo ""
            echo "$ENV" | jq -r '.[].envVar | "- \(.key): len=\(.value | length)"'
          } >> diagnostics/secrets-report.md
          cat diagnostics/secrets-report.md

      - name: Commit report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          B64=$(base64 -w0 diagnostics/secrets-report.md)
          CUR=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/diagnostics/secrets-report.md?ref=${{ github.ref_name }}")
          SHA=$(echo "$CUR" | jq -r '.sha // empty')
          PAYLOAD=$(jq -n --arg msg "secrets report run ${{ github.run_id }}" \
                         --arg content "$B64" \
                         --arg branch "${{ github.ref_name }}" \
                         --arg sha "$SHA" \
                         'if $sha == "" then
                            {message:$msg, content:$content, branch:$branch}
                          else
                            {message:$msg, content:$content, branch:$branch, sha:$sha}
                          end')
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/diagnostics/secrets-report.md" \
            -d "$PAYLOAD" | jq '.commit.sha // .message'

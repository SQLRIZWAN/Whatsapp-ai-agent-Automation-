name: Deploy Frontend and Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ── Backend → Render ──────────────────────────────────────────
  deploy-backend:
    name: Backend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          HTTP=$(curl -s -o /tmp/render.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -d '{}')
          echo "Render API response: HTTP $HTTP"
          cat /tmp/render.json
          if [[ "$HTTP" != "200" && "$HTTP" != "201" ]]; then
            echo "Render trigger failed with HTTP $HTTP"
            exit 1
          fi

      - name: Wait for Render deploy to go live
        run: |
          echo "Polling Render status (up to 10 min)..."
          for i in $(seq 1 40); do
            sleep 15
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=1" \
              | jq -r '.[0].deploy.status // "unknown"')
            echo "  attempt $i: $STATUS"
            if [[ "$STATUS" == "live" ]]; then
              echo "Render deploy succeeded"
              exit 0
            fi
            if [[ "$STATUS" == "failed" || "$STATUS" == "canceled" ]]; then
              echo "Render deploy $STATUS"
              exit 1
            fi
          done
          echo "Timed out waiting for Render deploy"
          exit 1

  # ── Frontend → GitHub Pages ───────────────────────────────────
  deploy-frontend:
    name: Frontend to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: https://whatsapp-ai-backend-8ylf.onrender.com
          VITE_APP_NAME: WhatsApp AI Automation
          VITE_GITHUB_PAGES: 'true'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Deploy Frontend and Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ── Backend → Render ──────────────────────────────────────────
  deploy-backend:
    name: Backend to Render
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Lookup Render service ID by name
        run: |
          SVC=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services?name=whatsapp-ai-backend&limit=5")
          echo "Services response: $SVC"
          SID=$(echo "$SVC" | jq -r '[.[] | select(.service.name=="whatsapp-ai-backend")] | .[0].service.id // empty')
          if [[ -z "$SID" || "$SID" == "null" ]]; then
            echo "Could not find whatsapp-ai-backend service on Render"
            exit 1
          fi
          echo "Found service ID: $SID"
          echo "RENDER_SID=$SID" >> $GITHUB_ENV

      - name: Trigger Render deploy
        run: |
          HTTP=$(curl -s -o /tmp/render.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/$RENDER_SID/deploys" \
            -d '{}')
          echo "HTTP: $HTTP"
          cat /tmp/render.json
          if [[ "$HTTP" != "200" && "$HTTP" != "201" ]]; then
            echo "Render trigger failed with HTTP $HTTP"
            exit 1
          fi

      - name: Wait for Render deploy to go live
        run: |
          echo "Polling Render status (up to 10 min)..."
          for i in $(seq 1 40); do
            sleep 15
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              "https://api.render.com/v1/services/$RENDER_SID/deploys?limit=1" \
              | jq -r '.[0].deploy.status // "unknown"')
            echo "  attempt $i: $STATUS"
            if [[ "$STATUS" == "live" ]]; then
              echo "Render deploy succeeded"
              break
            fi
            if [[ "$STATUS" == "failed" || "$STATUS" == "canceled" ]]; then
              echo "Render deploy $STATUS"
              exit 1
            fi
            if [[ $i -eq 40 ]]; then
              echo "Timed out waiting for Render deploy"
              exit 1
            fi
          done

      - name: Validate /health subsystems
        run: |
          # Backend just went live — validate that AI and TTS subsystems are healthy.
          # If /health returns 503 or any subsystem is false, fail the workflow.
          for i in $(seq 1 12); do
            sleep 10
            RESP=$(curl -s -w "\n%{http_code}" https://whatsapp-ai-backend-8ylf.onrender.com/health || true)
            HTTP=$(echo "$RESP" | tail -n1)
            BODY=$(echo "$RESP" | sed '$d')
            echo "  attempt $i — HTTP $HTTP — $BODY"
            if [[ "$HTTP" == "200" ]]; then
              AI=$(echo "$BODY" | jq -r '.ai // false')
              TTS=$(echo "$BODY" | jq -r '.tts // false')
              if [[ "$AI" == "true" && "$TTS" == "true" ]]; then
                echo "✅ /health green: ai=$AI tts=$TTS"
                exit 0
              fi
              echo "  /health degraded — ai=$AI tts=$TTS, retrying"
            fi
          done
          echo "❌ /health validation failed after 12 attempts"
          exit 1

      - uses: actions/checkout@v4

      - name: Fetch Render logs and commit to repo
        if: always()
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting 20s for log ingestion..."
          sleep 20
          SVC=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services?name=whatsapp-ai-backend&limit=5")
          SID=$(echo "$SVC" | jq -r '.[0].service.id')
          OWNER_ID=$(curl -s -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/services/$SID" | jq -r '.ownerId')
          NOW=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          AGO=$(date -u -d '30 minutes ago' +%Y-%m-%dT%H:%M:%S.000Z)
          LOGS=$(curl -s -G -H "Authorization: Bearer $RENDER_API_KEY" \
            "https://api.render.com/v1/logs" \
            --data-urlencode "ownerId=$OWNER_ID" \
            --data-urlencode "resource=$SID" \
            --data-urlencode "type=app" \
            --data-urlencode "startTime=$AGO" \
            --data-urlencode "endTime=$NOW" \
            --data-urlencode "limit=300" \
            | jq -r '.logs[]? | "\(.timestamp) \(.message)"')
          {
            echo "# Render deploy log — $(date -u)"
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo '```'
            echo "$LOGS"
            echo '```'
          } > /tmp/render-log.md
          cat /tmp/render-log.md
          B64=$(base64 -w0 /tmp/render-log.md)
          CUR=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/diagnostics/render-log.md")
          SHA=$(echo "$CUR" | jq -r '.sha // empty')
          PAYLOAD=$(jq -n --arg content "$B64" --arg sha "$SHA" \
            --arg msg "logs: Render deploy ${{ github.sha }}" \
            'if $sha == "" then {message:$msg,content:$content,branch:"main"}
             else {message:$msg,content:$content,branch:"main",sha:$sha} end')
          curl -s -X PUT \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/diagnostics/render-log.md" \
            -d "$PAYLOAD" | jq '.commit.sha // .message'

  # ── Frontend → GitHub Pages ───────────────────────────────────
  deploy-frontend:
    name: Frontend to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: https://whatsapp-ai-backend-8ylf.onrender.com
          VITE_APP_NAME: WhatsApp AI Automation
          VITE_GITHUB_PAGES: 'true'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

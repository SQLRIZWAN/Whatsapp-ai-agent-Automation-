<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="WhatsApp AI Automation System - Powered by Gemini AI" />
    <title>WhatsApp AI Agent</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search)
        const redirect = params.get('redirect')
        if (!redirect) return
        params.delete('redirect')
        const query = params.toString()
        const base = '/Whatsapp-ai-agent-Automation-/'
        window.history.replaceState(null, '', base + redirect + (query ? '?' + query : ''))
      })()
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
